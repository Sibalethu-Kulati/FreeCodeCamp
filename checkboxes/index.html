<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Settings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="settings-container">
        <form action="">
            <h1>Game Settings</h1>
            <label for="sound">
                <input type="checkbox" id="sound">Sound Effects
            </label>
            <label for="background">
                <input type="checkbox" id="background">Background Music
            </label>
            <label for="mode">
                <input type="checkbox" id="mode">Hard Mode
            </label>
            <label for="feedback">
                <input type="checkbox" id="feedback">Haptic Feedback
            </label>
        </form>
    </div>
</body>
</html>
