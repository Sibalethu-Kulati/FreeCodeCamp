<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div class="container">
            <h1>My To-Do List</h1>
            <ul class="todo-list">
                <!--item 1-->
                <div class="item-card">
                    <input type="checkbox" name="item-1" id="item-1">
                    <label for="item-1">Explore gaming keyboards</label>
                    <li class="sub-item">
                        <a href="" target="_blank">Store Link</a>
                    </li>
                </div>
                <!--item 2-->
                <div class="item-card">
                    <input type="checkbox" name="item-2" id="item-2">
                    <label for="item-2">Finish the report</label>
                    <li class="sub-item">
                        <a href="" target="_blank">Request Access</a>
                    </li>
                </div>
                <!--item 3-->
                <div class="item-card">
                    <input type="checkbox" name="item-1" id="item-1">
                    <label for="item-1">View Phone's Warranty</label>
                    <li class="sub-item">
                        <a href="" target="_blank">View Receipt</a>
                    </li>
                </div>
                <!--item 4-->
                <div class="item-card">
                    <input type="checkbox" name="item-1" id="item-1">
                    <label for="item-1">Check Processor Specs</label>
                    <li class="sub-item">
                        <a href="" target="_blank">View Model Number</a>
                    </li>
                </div>
            </ul>
        </div>
    </main> 
</body>
</html>
