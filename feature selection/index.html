<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Selection</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Feature Selection</h1>
    <div class="feature-card-container">
        <div class="feature-card">
            <label>
                <input type="checkbox">
                <h2 class="feature-name">Cloud Storage</h2>
                <p>100 Gigabyte secure storage</p>
            </label>
        </div>
        
        <div class="feature-card">
            <label>
                <input type="checkbox">
                <h2 class="feature-name">Dedicated Support</h2>
                <p>24/7 customer help</p>
            </label>
        </div>
        
        <div class="feature-card">
            <label>
                <input type="checkbox">
                <h2 class="feature-name">Advanced Analytics</h2>
                <p>Insights & reports</p>
            </label>
        </div>
        
        <div class="feature-card">
            <label>
                <input type="checkbox">
                <h2 class="feature-name">Custom User Themes</h2>
                <p>Personalized dashboard design</p>
            </label>
        </div>
        
        <div class="feature-card">
            <label>
                <input type="checkbox">
                <h2 class="feature-name">Multi-User Collab</h2>
                <p>Team access and sharing</p>
            </label>
        </div>
        
        <div class="feature-card">
            <label>
                <input type="checkbox">
                <h2 class="feature-name">API Access</h2>
                <p>Integrate with your custom built tools</p>
            </label>
        </div>
        
    </div>
</body>
</html>
